# Kamal destination: production
# Usage: kamal deploy -d production
#
# Caddy routes wallandshadow.com → localhost:3001

env:
  clear:
    PORT: "3001"

builder:
  args:
    VITE_DEPLOY_ENV: production
    VITE_OIDC_ISSUER: <%= ENV['OIDC_ISSUER'] %>
    VITE_OIDC_CLIENT_ID: <%= ENV['OIDC_CLIENT_ID'] %>

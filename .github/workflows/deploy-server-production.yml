# =============================================================================
# Deploy server to production
# =============================================================================
# Manual trigger only. Builds Docker image, pushes to GHCR, deploys via Kamal.
#
# Recommended workflow:
#   1. Verify test deployment is working (test.wallandshadow.com)
#   2. Trigger this workflow manually from GitHub Actions UI
#   3. Monitor the deployment via Kamal logs
#
# Prerequisites: same GitHub Secrets as deploy-server-test.yml, plus:
#   DATABASE_URL_PROD — PostgreSQL connection string (production database)
#
# Consider adding required reviewers to the "production" GitHub Environment.
# =============================================================================

name: Deploy Server (Production)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci-server.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: was-web/
          push: true
          tags: |
            ghcr.io/kaiEkkrin/wallandshadow:${{ github.sha }}
            ghcr.io/kaiEkkrin/wallandshadow:production-latest
          build-args: |
            VITE_DEPLOY_ENV=production
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Ruby (for Kamal)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: kamal deploy -d production --version ${{ github.sha }}

# =============================================================================
# Deploy server to production
# =============================================================================
# Manual trigger only. Builds image, pushes to GHCR, SSHes to the VPS to flip
# wallandshadow-prod.service onto the new tag.
#
# Recommended workflow:
#   1. Verify test deployment is working (test.wallandshadow.com)
#   2. Trigger this workflow manually from GitHub Actions UI
#   3. Monitor via: ssh root@VPS journalctl -u wallandshadow-prod -f
#
# Prerequisites (GitHub Secrets):
#   SSH_PRIVATE_KEY       — SSH key for VPS access
#   VPS_IP                — Hetzner VPS public IPv4 address
#   VPS_KNOWN_HOST        — pinned SSH host keys (captured by provision.yml)
#   OIDC_ISSUER           — Zitadel OIDC issuer URL
#   OIDC_PROD_CLIENT_ID   — Zitadel OIDC client ID
#
# Consider adding required reviewers to the "hetzner" GitHub Environment.
# =============================================================================

name: Deploy Server (Production)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci-server.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: hetzner

    env:
      IMAGE: ghcr.io/kaiekkrin/wallandshadow:${{ github.sha }}-prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: was-web/
          push: true
          tags: |
            ${{ env.IMAGE }}
            ghcr.io/kaiekkrin/wallandshadow:latest-prod
          build-args: |
            VITE_DEPLOY_ENV=production
            VITE_OIDC_ISSUER=${{ secrets.OIDC_ISSUER }}
            VITE_OIDC_CLIENT_ID=${{ secrets.OIDC_PROD_CLIENT_ID }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Flip image tag and restart wallandshadow-prod
        run: |
          ssh "root@${{ secrets.VPS_IP }}" bash -se <<EOF
          set -euo pipefail
          printf 'IMAGE=%s\n' '${{ env.IMAGE }}' > /etc/wallandshadow/prod.image
          systemctl restart wallandshadow-prod.service
          # Type=exec reports success as soon as docker run exec()'s; give the
          # container a few seconds to actually come up before re-checking.
          sleep 5
          systemctl is-active --quiet wallandshadow-prod.service
          systemctl --no-pager --lines=20 status wallandshadow-prod.service
          EOF

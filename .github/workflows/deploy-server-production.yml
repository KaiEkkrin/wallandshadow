# =============================================================================
# Deploy server to production
# =============================================================================
# Manual trigger only. Kamal builds the image, pushes to GHCR, and deploys.
#
# Recommended workflow:
#   1. Verify test deployment is working (test.wallandshadow.com)
#   2. Trigger this workflow manually from GitHub Actions UI
#   3. Monitor the deployment via Kamal logs
#
# Secrets flow:
#   - VPS_IP, SSH_PRIVATE_KEY, OIDC_*: from GitHub Secrets (static)
#   - DATABASE_URL, JWT_SECRET, S3_*: fetched from VPS at deploy time
#
# Prerequisites (GitHub Secrets):
#   SSH_PRIVATE_KEY       — SSH key for VPS access
#   VPS_IP                — Hetzner VPS public IPv4 address
#   VPS_KNOWN_HOST        — pinned SSH host keys (captured by provision.yml)
#   OIDC_ISSUER           — Zitadel OIDC issuer URL
#   OIDC_PROD_CLIENT_ID   — Zitadel OIDC client ID
#
# Consider adding required reviewers to the "production" GitHub Environment.
# =============================================================================

name: Deploy Server (Production)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci-server.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: hetzner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Ruby (for Kamal)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pinned host key (captured by provision.yml) — no TOFU at deploy time.
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Fetch secrets from VPS
        run: .github/scripts/fetch-vps-secrets.sh "${{ secrets.VPS_IP }}" DATABASE_URL_PROD

      - name: Deploy to production
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          GIT_COMMIT: ${{ github.sha }}
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          OIDC_CLIENT_ID: ${{ secrets.OIDC_PROD_CLIENT_ID }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: kamal deploy -d production --version ${{ github.sha }}

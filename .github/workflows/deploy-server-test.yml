# =============================================================================
# Deploy server to test environment
# =============================================================================
# Triggered on push to main (when server, shared, or deployment files change).
# Builds the image, pushes to GHCR, then SSHes to the VPS to flip the
# wallandshadow-test systemd unit onto the new tag.
#
# The VPS has a systemd unit wallandshadow-test.service that reads its image
# tag from /etc/wallandshadow/test.image (written by Ansible with a fallback,
# then overwritten here). `systemctl restart` pulls and boots the new tag.
#
# Prerequisites (GitHub Secrets):
#   SSH_PRIVATE_KEY       — SSH key for VPS access (same key used by Ansible)
#   VPS_IP                — Hetzner VPS public IPv4 address
#   VPS_KNOWN_HOST        — pinned SSH host keys (captured by provision.yml)
#   OIDC_ISSUER           — Zitadel OIDC issuer URL
#   OIDC_TEST_CLIENT_ID   — Zitadel OIDC client ID
# =============================================================================

name: Deploy Server (Test)

on:
  push:
    branches: [main]
    paths:
      - 'was-web/server/**'
      - 'was-web/packages/shared/**'
      - 'was-web/src/**'
      - 'was-web/package.json'
      - 'was-web/yarn.lock'
      - 'was-web/vite.config.ts'
      - 'was-web/Dockerfile'
      - 'was-web/.dockerignore'
      - '.github/workflows/deploy-server-test.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci-web:
    uses: ./.github/workflows/ci.yml

  ci-server:
    uses: ./.github/workflows/ci-server.yml

  build-and-deploy:
    needs: [ci-web, ci-server]
    runs-on: ubuntu-latest
    environment: hetzner

    env:
      IMAGE: ghcr.io/kaiekkrin/wallandshadow:${{ github.sha }}-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: was-web/
          push: true
          tags: |
            ${{ env.IMAGE }}
            ghcr.io/kaiekkrin/wallandshadow:latest-test
          build-args: |
            VITE_DEPLOY_ENV=test
            VITE_BACKEND=hono
            VITE_OIDC_ISSUER=${{ secrets.OIDC_ISSUER }}
            VITE_OIDC_CLIENT_ID=${{ secrets.OIDC_TEST_CLIENT_ID }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Flip image tag and restart wallandshadow-test
        run: |
          ssh "root@${{ secrets.VPS_IP }}" bash -se <<EOF
          set -euo pipefail
          printf 'IMAGE=%s\n' '${{ env.IMAGE }}' > /etc/wallandshadow/test.image
          systemctl restart wallandshadow-test.service
          # Type=exec reports success as soon as docker run exec()'s; give the
          # container a few seconds to actually come up before re-checking.
          sleep 5
          systemctl is-active --quiet wallandshadow-test.service
          systemctl --no-pager --lines=20 status wallandshadow-test.service
          EOF

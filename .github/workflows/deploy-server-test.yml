# =============================================================================
# Deploy server to test environment
# =============================================================================
# Triggered on push to main (when server, shared, or deployment files change).
# Kamal builds the Docker image, pushes to GHCR, and deploys to test — no
# separate docker/build-push-action step (Kamal owns build tags + cache).
#
# Secrets flow:
#   - VPS_IP, SSH_PRIVATE_KEY, OIDC_*: from GitHub Secrets (static)
#   - DATABASE_URL, JWT_SECRET, S3_*: fetched from VPS at deploy time
#     (written by Ansible during provisioning)
#
# Prerequisites (GitHub Secrets):
#   SSH_PRIVATE_KEY       — SSH key for VPS access (same key used by Ansible)
#   VPS_IP                — Hetzner VPS public IPv4 address
#   VPS_KNOWN_HOST        — pinned SSH host keys (captured by provision.yml)
#   OIDC_ISSUER           — Zitadel OIDC issuer URL
#   OIDC_TEST_CLIENT_ID   — Zitadel OIDC client ID
# =============================================================================

name: Deploy Server (Test)

on:
  push:
    branches: [main]
    paths:
      - 'was-web/server/**'
      - 'was-web/packages/shared/**'
      - 'was-web/src/**'
      - 'was-web/vite.config.ts'
      - 'was-web/Dockerfile'
      - 'was-web/.dockerignore'
      - 'config/**'
      - '.github/workflows/deploy-server-test.yml'
      - '.kamal/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci-web:
    uses: ./.github/workflows/ci.yml

  ci-server:
    uses: ./.github/workflows/ci-server.yml

  build-and-deploy:
    needs: [ci-web, ci-server]
    runs-on: ubuntu-latest
    environment: hetzner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Ruby (for Kamal)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pinned host key (captured by provision.yml) — no TOFU at deploy time.
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Fetch secrets from VPS
        run: .github/scripts/fetch-vps-secrets.sh "${{ secrets.VPS_IP }}" DATABASE_URL_TEST

      - name: Deploy to test
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          GIT_COMMIT: ${{ github.sha }}
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          OIDC_CLIENT_ID: ${{ secrets.OIDC_TEST_CLIENT_ID }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: kamal deploy -d test --version ${{ github.sha }}

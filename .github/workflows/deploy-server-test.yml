# =============================================================================
# Deploy server to test environment
# =============================================================================
# Triggered on push to main (when server, shared, or deployment files change).
# Builds Docker image, pushes to GHCR, deploys to test via Kamal.
#
# Prerequisites (GitHub Secrets):
#   SSH_PRIVATE_KEY      — SSH key for VPS access (same key used by Ansible)
#   VPS_IP               — Hetzner VPS public IPv4 address
#   DATABASE_URL_TEST    — PostgreSQL connection string (test database)
#   JWT_SECRET           — JWT signing key
#   S3_ACCESS_KEY        — Hetzner Object Storage access key
#   S3_SECRET_KEY        — Hetzner Object Storage secret key
#   OIDC_ISSUER          — Zitadel OIDC issuer URL
#   KAMAL_REGISTRY_PASSWORD — GHCR token (or use GITHUB_TOKEN)
# =============================================================================

name: Deploy Server (Test)

on:
  push:
    branches: [main]
    paths:
      - 'was-web/server/**'
      - 'was-web/packages/shared/**'
      - 'was-web/src/**'
      - 'was-web/vite.config.ts'
      - 'was-web/Dockerfile'
      - 'was-web/.dockerignore'
      - 'config/**'
      - '.github/workflows/deploy-server-test.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci-server.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: was-web/
          push: true
          tags: |
            ghcr.io/kaiEkkrin/wallandshadow:${{ github.sha }}
            ghcr.io/kaiEkkrin/wallandshadow:latest
          build-args: |
            VITE_DEPLOY_ENV=test
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Ruby (for Kamal)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to test
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: kamal deploy -d test --version ${{ github.sha }}

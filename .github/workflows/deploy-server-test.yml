# =============================================================================
# Deploy server to test environment
# =============================================================================
# Triggered on push to main (when server, shared, or deployment files change).
# Builds Docker image, pushes to GHCR, deploys to test via Kamal.
#
# Secrets flow:
#   - VPS_IP, SSH_PRIVATE_KEY, OIDC_*: from GitHub Secrets (static)
#   - DATABASE_URL, JWT_SECRET, S3_*: fetched from VPS at deploy time
#     (written by Ansible during provisioning)
#
# Prerequisites (GitHub Secrets):
#   SSH_PRIVATE_KEY       — SSH key for VPS access (same key used by Ansible)
#   VPS_IP                — Hetzner VPS public IPv4 address
#   OIDC_ISSUER           — Zitadel OIDC issuer URL
#   OIDC_CLIENT_ID        — Zitadel OIDC client ID
# =============================================================================

name: Deploy Server (Test)

on:
  push:
    branches: [main]
    paths:
      - 'was-web/server/**'
      - 'was-web/packages/shared/**'
      - 'was-web/src/**'
      - 'was-web/vite.config.ts'
      - 'was-web/Dockerfile'
      - 'was-web/.dockerignore'
      - 'config/**'
      - '.github/workflows/deploy-server-test.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci-server.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: hetzner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: was-web/
          push: true
          tags: |
            ghcr.io/kaiEkkrin/wallandshadow:${{ github.sha }}
            ghcr.io/kaiEkkrin/wallandshadow:latest
          build-args: |
            VITE_DEPLOY_ENV=test
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Ruby (for Kamal)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Fetch secrets from VPS
        run: |
          ssh root@${{ secrets.VPS_IP }} cat /etc/wallandshadow/secrets >> "$GITHUB_ENV"
          echo "DATABASE_URL=$(ssh root@${{ secrets.VPS_IP }} grep ^DATABASE_URL_TEST /etc/wallandshadow/secrets | cut -d= -f2-)" >> "$GITHUB_ENV"

      - name: Deploy to test
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: kamal deploy -d test --version ${{ github.sha }}

# =============================================================================
# Wall & Shadow — VPS provisioning playbook
# =============================================================================
# Configures an Ubuntu Server VPS with all infrastructure services:
#   - PostgreSQL 17 (native, systemd)
#   - Caddy reverse proxy (native, systemd)
#   - Docker (runs the application containers via systemd units)
#   - ufw firewall
#   - Unattended security upgrades
#   - Nightly PostgreSQL backup to S3
#   - Auto-generated secrets (passwords, JWT key)
#
# Usage (standalone):
#   ansible-playbook playbook.yml -i inventory.yml \
#     -e volume_id=12345678 \
#     -e s3_access_key=... -e s3_secret_key=...
#
# Normally run by the provision.yml GitHub Actions workflow, which passes
# OpenTofu outputs and S3 credentials automatically.
# =============================================================================

- name: Provision Wall & Shadow VPS
  hosts: vps
  become: true
  vars_files:
    - vars/main.yml

  tasks:
    # ── System packages ─────────────────────────────────────────────────────

    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - python3-psycopg2   # Required for Ansible PostgreSQL modules
          - unattended-upgrades
          - ufw
        state: present
        update_cache: true

    # ── PostgreSQL apt repository ───────────────────────────────────────────

    - name: Add PostgreSQL apt signing key
      ansible.builtin.apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

    - name: Add PostgreSQL apt repository
      ansible.builtin.apt_repository:
        repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_facts['distribution_release'] }}-pgdg main"
        state: present

    # Log rotation for PostgreSQL's own logs is handled by the package-default
    # logrotate config at /etc/logrotate.d/postgresql-common (weekly, keep 10,
    # compressed). No playbook task needed — just don't remove that file.
    - name: Install PostgreSQL {{ pg_version }}
      ansible.builtin.apt:
        name: "postgresql-{{ pg_version }}"
        state: present
        update_cache: true

    # ── Caddy ───────────────────────────────────────────────────────────────

    - name: Add Caddy apt signing key
      ansible.builtin.apt_key:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        state: present

    - name: Add Caddy apt repository
      ansible.builtin.apt_repository:
        repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
        state: present

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: true

    # ── Docker ──────────────────────────────────────────────────────────────

    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present

    # Route container stdout/stderr to journald instead of the default json-file
    # driver. journald already captures the systemd units' output, so the
    # on-disk json-file copy was redundant and unbounded; journald handles
    # rotation via SystemMaxUse. `docker logs <name>` still works.
    - name: Configure Docker to log via journald
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "log-driver": "journald"
          }
      notify: Restart Docker

    - name: Enable Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ── AWS CLI (for S3 backups) ────────────────────────────────────────────

    - name: Install AWS CLI dependencies
      ansible.builtin.apt:
        name:
          - unzip
          - curl
        state: present

    - name: Check if AWS CLI is already installed
      ansible.builtin.command: /usr/local/bin/aws --version
      register: aws_cli_check
      changed_when: false
      failed_when: false

    - name: Download AWS CLI v2 installer
      ansible.builtin.get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-{{ ansible_facts['architecture'] }}.zip"
        dest: /tmp/awscliv2.zip
        mode: "0644"
      when: aws_cli_check.rc != 0

    - name: Unarchive AWS CLI v2 installer
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true
      when: aws_cli_check.rc != 0

    - name: Install AWS CLI v2
      ansible.builtin.command: /tmp/aws/install
      when: aws_cli_check.rc != 0

    - name: Clean up AWS CLI installer
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/awscliv2.zip
        - /tmp/aws
      when: aws_cli_check.rc != 0

    # ── S3 bucket CORS ──────────────────────────────────────────────────────
    # The browser fetches images directly from Hetzner Object Storage via
    # presigned URLs. Three.js TextureLoader sets crossOrigin='anonymous', so
    # the bucket must return CORS headers allowing the app's domain.

    - name: Ensure config directory exists for CORS policies
      ansible.builtin.file:
        path: "{{ secrets_dir }}"
        state: directory
        mode: "0700"
        owner: root
        group: root

    - name: Render CORS policy for each app bucket
      ansible.builtin.template:
        src: bucket_cors.json.j2
        dest: "{{ secrets_dir }}/cors-{{ item.bucket }}.json"
        owner: root
        group: root
        mode: "0600"
      vars:
        cors_origin: "{{ item.cors_origin }}"
      loop:
        - { bucket: "{{ s3_bucket_prod }}", cors_origin: "{{ domain_prod }}" }
        - { bucket: "{{ s3_bucket_test }}", cors_origin: "{{ domain_test }}" }

    - name: Apply CORS policy to each app bucket
      ansible.builtin.command:
        cmd: >-
          aws s3api put-bucket-cors
          --bucket {{ item.bucket }}
          --cors-configuration file://{{ secrets_dir }}/cors-{{ item.bucket }}.json
          --endpoint-url {{ s3_endpoint }}
      environment:
        AWS_ACCESS_KEY_ID: "{{ s3_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ s3_secret_key }}"
        AWS_DEFAULT_REGION: "hel1"
      loop:
        - { bucket: "{{ s3_bucket_prod }}" }
        - { bucket: "{{ s3_bucket_test }}" }
      changed_when: true

    # ── Firewall ────────────────────────────────────────────────────────────

    - name: Allow SSH through firewall
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow HTTP through firewall
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS through firewall
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Enable firewall (deny all other incoming)
      community.general.ufw:
        state: enabled
        default: deny
        direction: incoming

    - name: Allow all outgoing traffic
      community.general.ufw:
        default: allow
        direction: outgoing

    # ── SSH hardening ───────────────────────────────────────────────────────

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart sshd

    # ── Volume mount (PostgreSQL data) ──────────────────────────────────────
    # Volume is provisioned by OpenTofu. volume_id is passed as an extra-var.
    # Device path uses the stable by-id name that survives reboots.

    - name: Create volume mount point
      ansible.builtin.file:
        path: "{{ pgdata_mount }}"
        state: directory
        mode: "0700"
      when: volume_id is defined and volume_id != ''

    - name: Mount volume at {{ pgdata_mount }}
      ansible.posix.mount:
        path: "{{ pgdata_mount }}"
        src: "/dev/disk/by-id/scsi-0HC_Volume_{{ volume_id }}"
        fstype: ext4
        opts: discard,nofail,defaults
        state: mounted
      when: volume_id is defined and volume_id != ''

    - name: Set volume ownership for postgres
      ansible.builtin.file:
        path: "{{ pgdata_mount }}"
        owner: postgres
        group: postgres
        mode: "0700"
      when: volume_id is defined and volume_id != ''

    # ── Secret generation ───────────────────────────────────────────────────
    # Idempotent across provision runs: the VPS's existing secrets file is the
    # source of truth. We slurp it, parse out POSTGRES_PASSWORD and JWT_SECRET,
    # and reuse those values. Only on a true first provision (file absent) do
    # we generate new ones via the local password lookup.
    #
    # Why this matters: rotating JWT_SECRET invalidates every existing session
    # token (forced re-login); rotating pg_password leaves the currently-
    # running container with a stale DATABASE_URL until the next deploy
    # refreshes its env-file. The local `secrets/` cache used to provide
    # idempotency, but on ephemeral CI runners it's cold every run.

    - name: Check whether secrets file already exists on VPS
      ansible.builtin.stat:
        path: "{{ secrets_file }}"
      register: existing_secrets_stat

    - name: Read existing secrets file from VPS
      ansible.builtin.slurp:
        src: "{{ secrets_file }}"
      register: existing_secrets_slurp
      when: existing_secrets_stat.stat.exists

    - name: Parse existing POSTGRES_PASSWORD / JWT_SECRET
      ansible.builtin.set_fact:
        existing_pg_password: >-
          {{ (existing_secrets_slurp.content | b64decode
              | regex_search('^POSTGRES_PASSWORD=(.+)$', '\1', multiline=True))
             | default('', true) }}
        existing_jwt_secret: >-
          {{ (existing_secrets_slurp.content | b64decode
              | regex_search('^JWT_SECRET=(.+)$', '\1', multiline=True))
             | default('', true) }}
      when: existing_secrets_stat.stat.exists

    - name: Choose PostgreSQL password (reuse if present, else generate)
      ansible.builtin.set_fact:
        pg_password: >-
          {{ existing_pg_password
             if (existing_pg_password | default('') | length > 0)
             else lookup('ansible.builtin.password',
                  'secrets/pg_password length=32 chars=ascii_letters,digits') }}

    - name: Choose JWT secret (reuse if present, else generate)
      ansible.builtin.set_fact:
        jwt_secret: >-
          {{ existing_jwt_secret
             if (existing_jwt_secret | default('') | length > 0)
             else lookup('ansible.builtin.password',
                  'secrets/jwt_secret length=48 chars=ascii_letters,digits') }}

    # ── Secrets file on VPS ─────────────────────────────────────────────────

    - name: Create secrets directory
      ansible.builtin.file:
        path: "{{ secrets_dir }}"
        state: directory
        mode: "0700"
        owner: root
        group: root

    - name: Write secrets file
      ansible.builtin.template:
        src: templates/secrets.env.j2
        dest: "{{ secrets_file }}"
        mode: "0600"
        owner: root
        group: root

    # ── PostgreSQL data directory on volume ─────────────────────────────────
    # If a volume is attached, move the PostgreSQL data directory to it.
    # Idempotent: skips if data already exists on the volume.

    - name: Check if PostgreSQL data exists on volume
      ansible.builtin.stat:
        path: "{{ pgdata_mount }}/main/PG_VERSION"
      register: pgdata_on_volume
      when: volume_id is defined and volume_id != ''

    - name: Stop PostgreSQL for data migration to volume
      ansible.builtin.systemd:
        name: postgresql
        state: stopped
      when:
        - volume_id is defined and volume_id != ''
        - not (pgdata_on_volume.stat.exists | default(false))

    - name: Copy PostgreSQL data to volume
      ansible.builtin.command:
        cmd: "rsync -av /var/lib/postgresql/{{ pg_version }}/main/ {{ pgdata_mount }}/main/"
      when:
        - volume_id is defined and volume_id != ''
        - not (pgdata_on_volume.stat.exists | default(false))

    - name: Set volume data directory ownership
      ansible.builtin.file:
        path: "{{ pgdata_mount }}/main"
        owner: postgres
        group: postgres
        recurse: true
      when: volume_id is defined and volume_id != ''

    - name: Point PostgreSQL data_directory to volume
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
        regexp: "^data_directory"
        line: "data_directory = '{{ pgdata_mount }}/main'"
      notify: Restart PostgreSQL
      when: volume_id is defined and volume_id != ''

    - name: Start PostgreSQL after data migration
      ansible.builtin.systemd:
        name: postgresql
        state: started
      when:
        - volume_id is defined and volume_id != ''
        - not (pgdata_on_volume.stat.exists | default(false))

    # ── PostgreSQL configuration ────────────────────────────────────────────

    - name: Create PostgreSQL role
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ pg_user }}"
        password: "{{ pg_password }}"
        role_attr_flags: CREATEDB

    - name: Create production database
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ pg_db_prod }}"
        owner: "{{ pg_user }}"

    - name: Create test database
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ pg_db_test }}"
        owner: "{{ pg_user }}"

    - name: Deploy pg_hba.conf
      ansible.builtin.template:
        src: templates/pg_hba.conf.j2
        dest: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
        owner: postgres
        group: postgres
        mode: "0640"
      notify: Restart PostgreSQL

    # ── Telemetry (goaccess + Caddy basic auth) ─────────────────────────────
    # GoAccess parses Caddy's JSON access log on a timer and overwrites a
    # static HTML report, served by Caddy at /stats behind HTTP basic auth.

    - name: Install goaccess
      ansible.builtin.apt:
        name: goaccess
        state: present

    - name: Create goaccess + Caddy log directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.owner }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: /var/log/caddy,    owner: caddy, mode: "0750" }
        - { path: /var/www/stats,    owner: caddy, mode: "0755" }
        - { path: /var/lib/goaccess, owner: caddy, mode: "0750" }

    # Seed the bcrypt salt from the password itself so the hash is
    # deterministic across runs and we don't trigger a Caddy reload on every
    # re-provision. password_hash('bcrypt') needs passlib on the controller —
    # see the `pip install` step in .github/workflows/provision.yml.
    - name: Compute bcrypt hash for stats basic-auth
      ansible.builtin.set_fact:
        stats_basic_auth_hash: >-
          {{ stats_basic_auth_password
             | password_hash('bcrypt', (stats_basic_auth_password | hash('sha256'))[0:22]) }}

    - name: Render goaccess config
      ansible.builtin.template:
        src: templates/goaccess.conf.j2
        dest: /etc/wallandshadow/goaccess.conf
        owner: root
        group: root
        mode: "0644"

    - name: Render goaccess-report systemd unit + timer
      ansible.builtin.template:
        src: "templates/goaccess-report.{{ item }}.j2"
        dest: "/etc/systemd/system/goaccess-report.{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - service
        - timer
      notify: Reload systemd

    - name: Enable goaccess-report timer
      ansible.builtin.systemd:
        name: goaccess-report.timer
        enabled: true
        state: started
        daemon_reload: true

    # ── Caddy configuration ─────────────────────────────────────────────────

    - name: Deploy Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: "0644"
      notify: Reload Caddy

    - name: Enable Caddy service
      ansible.builtin.systemd:
        name: caddy
        enabled: true
        state: started

    # ── Application containers (systemd units) ─────────────────────────────
    # Each environment runs as a plain systemd service that shells out to
    # `docker run`. The image tag is written by CI into
    # /etc/wallandshadow/<env>.image; `systemctl restart` picks it up.

    - name: Render env-file for test application
      ansible.builtin.template:
        src: templates/wallandshadow.env.j2
        dest: /etc/wallandshadow/test.env
        owner: root
        group: root
        mode: "0600"
      vars:
        env_name: test
        app_port: "{{ app_port_test }}"
        db_name: "{{ pg_db_test }}"
        s3_bucket: "{{ s3_bucket_test }}"
        oidc_client_id: "{{ oidc_test_client_id | mandatory }}"

    - name: Render env-file for production application
      ansible.builtin.template:
        src: templates/wallandshadow.env.j2
        dest: /etc/wallandshadow/prod.env
        owner: root
        group: root
        mode: "0600"
      vars:
        env_name: prod
        app_port: "{{ app_port_prod }}"
        db_name: "{{ pg_db_prod }}"
        s3_bucket: "{{ s3_bucket_prod }}"
        oidc_client_id: "{{ oidc_prod_client_id | mandatory }}"

    - name: Render systemd unit for each application environment
      ansible.builtin.template:
        src: templates/wallandshadow.service.j2
        dest: "/etc/systemd/system/wallandshadow-{{ item.env_name }}.service"
        owner: root
        group: root
        mode: "0644"
      vars:
        env_name: "{{ item.env_name }}"
        app_port: "{{ item.app_port }}"
      loop:
        - { env_name: test, app_port: "{{ app_port_test }}" }
        - { env_name: prod, app_port: "{{ app_port_prod }}" }
      notify: Reload systemd

    - name: Seed image-tag file for each environment (only if missing)
      ansible.builtin.copy:
        dest: "/etc/wallandshadow/{{ item }}.image"
        content: "IMAGE=ghcr.io/kaiekkrin/wallandshadow:latest-{{ item }}\n"
        force: false
        owner: root
        group: root
        mode: "0644"
      loop:
        - test
        - prod

    - name: Enable application systemd units
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        daemon_reload: true
      loop:
        - wallandshadow-test.service
        - wallandshadow-prod.service

    # ── Journald retention ──────────────────────────────────────────────────
    # Defaults let journald grow until ~10% of /var fills — months of logs on
    # a small VPS. Cap at 30 days / 2 GB instead.

    - name: Create journald drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure journald retention
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/wallandshadow.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Journal]
          MaxRetentionSec=30day
          MaxFileSec=1week
          SystemMaxUse=2G
          Compress=yes
      notify: Restart systemd-journald

    # ── Unattended upgrades ─────────────────────────────────────────────────

    - name: Enable unattended upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        mode: "0644"

    - name: Configure unattended-upgrades behaviour
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
        mode: "0644"
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}";
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
              "${distro_id}:${distro_codename}-updates";
          };
          Unattended-Upgrade::Automatic-Reboot "true";
          Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
          Unattended-Upgrade::Automatic-Reboot-Time "04:30";
          Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";

    # ── Backup cron ─────────────────────────────────────────────────────────

    - name: Deploy backup script
      ansible.builtin.template:
        src: templates/pg_backup.sh.j2
        dest: /usr/local/bin/pg_backup.sh
        mode: "0755"
        owner: root
        group: root

    - name: Schedule nightly backup
      ansible.builtin.cron:
        name: "PostgreSQL backup to S3"
        hour: "{{ backup_hour }}"
        minute: "{{ backup_minute }}"
        job: "/usr/local/bin/pg_backup.sh >> /var/log/pg_backup.log 2>&1"
        user: root

    # cron appends to /var/log/pg_backup.log forever; rotate it ourselves.
    # copytruncate because cron reopens the same path on every run.
    - name: Configure logrotate for pg_backup.log
      ansible.builtin.copy:
        dest: /etc/logrotate.d/pg_backup
        owner: root
        group: root
        mode: "0644"
        content: |
          /var/log/pg_backup.log {
              weekly
              rotate 8
              compress
              missingok
              notifempty
              copytruncate
          }

    # ── Display status ──────────────────────────────────────────────────────

    - name: Display provisioning summary
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════════╗
          ║  Provisioning complete                                          ║
          ╚══════════════════════════════════════════════════════════════════╝

          Secrets file: {{ secrets_file }}
          Deploy workflows fetch DATABASE_URL, JWT_SECRET, and S3 creds
          from the VPS via SSH — no manual secret copying needed.

  # ── Handlers ──────────────────────────────────────────────────────────────

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: Restart PostgreSQL
      ansible.builtin.systemd:
        name: postgresql
        state: restarted

    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Restart systemd-journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted

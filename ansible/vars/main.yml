# =============================================================================
# Ansible variables — Wall & Shadow VPS configuration
# =============================================================================
# These are non-secret configuration values. Secrets (passwords, keys) are
# auto-generated by the playbook and cached in ansible/secrets/ (gitignored).
# =============================================================================

# ── PostgreSQL ────────────────────────────────────────────────────────────────
pg_version: "17"
pg_user: "was"
pg_db_prod: "wallandshadow"
pg_db_test: "wallandshadow_test"

# ── Application containers ───────────────────────────────────────────────────
app_port_prod: 3001
app_port_test: 3002

# ── Domains (Caddy reverse proxy) ────────────────────────────────────────────
# Update these to match your actual domain before running the playbook.
domain_prod: "wallandshadow.com"
domain_test: "test.wallandshadow.com"

# ── Secrets file on VPS ──────────────────────────────────────────────────────
secrets_dir: "/etc/wallandshadow"
secrets_file: "/etc/wallandshadow/secrets"

# ── Backup ────────────────────────────────────────────────────────────────────
# S3 bucket and endpoint for nightly pg_dump backups.
# Update these to match your Hetzner Object Storage configuration.
backup_s3_bucket: "wallandshadow-backups"
backup_s3_endpoint: "https://fsn1.your-objectstorage.com"
backup_hour: "3"
backup_minute: "0"

# =============================================================================
# Ansible variables — Wall & Shadow VPS configuration
# =============================================================================
# These are non-secret configuration values. Secrets (passwords, keys) are
# auto-generated by the playbook and cached in ansible/secrets/ (gitignored).
# =============================================================================

# ── PostgreSQL ────────────────────────────────────────────────────────────────
pg_version: "17"
pg_user: "was"
pg_db_prod: "wallandshadow"
pg_db_test: "wallandshadow_test"

# ── Application containers ───────────────────────────────────────────────────
app_port_prod: 3001
app_port_test: 3002

# ── Domains (Caddy reverse proxy) ────────────────────────────────────────────
# Update these to match your actual domain before running the playbook.
domain_prod: "wallandshadow.com"
domain_test: "test.wallandshadow.com"

# ── Secrets file on VPS ──────────────────────────────────────────────────────
secrets_dir: "/etc/wallandshadow"
secrets_file: "/etc/wallandshadow/secrets"

# ── Volume (PostgreSQL data) ──────────────────────────────────────────────────
# Passed as extra-var from the provision workflow (OpenTofu output).
# volume_id: "12345678"  — set via -e volume_id=... on the command line
pgdata_mount: "/mnt/pgdata"

# ── S3 / Object Storage ──────────────────────────────────────────────────────
# Endpoint and bucket for backups. Credentials passed as extra-vars from the
# provision workflow (originally GitHub Secrets).
# s3_access_key: set via -e
# s3_secret_key: set via -e
s3_endpoint: "https://fsn1.your-objectstorage.com"
s3_bucket_backups: "wallandshadow-backups"
s3_bucket_prod: "wallandshadow-prod"
s3_bucket_test: "wallandshadow-test"

# ── Backup ────────────────────────────────────────────────────────────────────
backup_hour: "3"
backup_minute: "0"
